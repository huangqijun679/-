</head>

  provider: 'openai', model: 'gpt-4o-mini', lang: 'zh',
  skills: [], availableSkills: [], personas: [], currentPersonaId: '',

function t(key, ...args) {
  let s = (LANG[state.lang] || LANG.zh)[key] || key;
  if (args.length) s = s.replace('{p}', args[0]);
  return s;
}

const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

function toast(msg, type = 'info') {
  const container = $('#toastContainer');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => {
    el.style.opacity = '0';
    el.style.transform = 'translateX(20px)';
    el.style.transition = 'all 0.3s';
    setTimeout(() => el.remove(), 300);
  }, 3000);
}

async function api(url, opts = {}) {
  const res = await fetch(url, { headers: { 'Content-Type': 'application/json' }, ...opts });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ detail: res.statusText }));
    throw new Error(err.detail || 'Request failed');
  }
  return res.json();
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

function renderMarkdown(text) {
  if (typeof marked !== 'undefined') {
    return marked.parse(text, { breaks: true });
  }
  return text.replace(/\n/g, '<br>');
}

function formatTime(dateStr) {
  try {
    const d = new Date(dateStr);
    if (isNaN(d.getTime())) return '';
    return d.toLocaleTimeString(state.lang === 'zh' ? 'zh-CN' : 'en-US', { hour: '2-digit', minute: '2-digit' });
  } catch { return ''; }
}

// --- Theme ---
function applyTheme() {
  document.body.setAttribute('data-theme', state.theme);
  $('#themeIcon').textContent = state.theme === 'dark' ? '\u2600' : '\u263E';
  localStorage.setItem('theme', state.theme);
}

function toggleTheme() {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  applyTheme();
}

// --- Sessions ---
async function loadSessions() {
  state.sessions = await api('/api/sessions');
  renderSessions();
}

function renderSessions() {
  const el = $('#historyList');
  if (!state.sessions.length) {
    el.innerHTML = '<div class="hist-empty">' + t('noConversations') + '</div>';
    return;
  }
  el.innerHTML = state.sessions.map(s => `
    <div class="hist-item${s.id === state.currentId ? ' active' : ''}" data-id="${s.id}">
      <div class="hist-row">
        <span>${escapeHtml(s.title)}</span>
        <button class="hist-del" data-id="${s.id}" title="${t('histDel')}">&#10005;</button>
      </div>
    </div>
  `).join('');
  el.querySelectorAll('.hist-item').forEach(item => {
    item.addEventListener('click', e => {
      if (e.target.closest('.hist-del')) return;
      switchSession(item.dataset.id);
    });
  });
  el.querySelectorAll('.hist-del').forEach(btn => {
    btn.addEventListener('click', async e => {
      e.stopPropagation();
      if (!confirm(t('deleteConfirm'))) return;
      await api('/api/sessions/' + btn.dataset.id, { method: 'DELETE' });
      if (state.currentId === btn.dataset.id) {
        state.currentId = null;
        const s = state.sessions[0];
        if (s) switchSession(s.id);
        else { showEmptyState(); updateHeader(''); }
      }
      await loadSessions();
    });
  });
}

async function createSession() {
  const s = await api('/api/sessions', { method: 'POST' });
  state.sessions.unshift(s);
  await switchSession(s.id);
  renderSessions();
}

async function switchSession(id) {
  state.currentId = id;
  renderSessions();
  const s = state.sessions.find(x => x.id === id);
  updateHeader(s ? s.title : '');
  const msgs = await api(`/api/sessions/${id}/messages`);
  renderMessages(msgs);
}

function updateHeader(title) {
  $('#sessionTitle').textContent = title || t('sessionTitle');
}

// --- Messages ---
function renderMessages(msgs) {
  const el = $('#messages');
  if (!msgs || !msgs.length) {
    showEmptyState();
    return;
  }
  el.innerHTML = msgs.map(m => {
    const time = m.created_at ? formatTime(m.created_at) : '';
    const copyBtn = `<div class="msg-actions"><button class="msg-action-btn copy-btn" title="${t('copied')}">&#128203;</button></div>`;
    if (m.role === 'assistant') {
      return `<div class="msg assistant">${copyBtn}${renderMarkdown(m.content)}<div class="msg-time">${time}</div></div>`;
    }
    return `<div class="msg user">${copyBtn}<div style="white-space:pre-wrap">${escapeHtml(m.content)}</div><div class="msg-time">${time}</div></div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
  bindCopyButtons();
}

function bindCopyButtons() {
  $$('.copy-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const msg = btn.closest('.msg');
      const text = msg.textContent.replace(t('copied'), '').trim();
      navigator.clipboard.writeText(text).then(() => {
        toast(t('copied'), 'success');
      });
    });
  });
}

function addMessage(role, content) {
  const el = $('#messages');
  const empty = el.querySelector('.empty-state');
  if (empty) empty.remove();
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const copyBtn = document.createElement('div');
  copyBtn.className = 'msg-actions';
  copyBtn.innerHTML = `<button class="msg-action-btn copy-btn" title="${t('copied')}">&#128203;</button>`;
  div.appendChild(copyBtn);
  if (role === 'assistant') {
    div.innerHTML += renderMarkdown(content);
  } else {
    const contentDiv = document.createElement('div');
    contentDiv.style.whiteSpace = 'pre-wrap';
    contentDiv.textContent = content;
    div.appendChild(contentDiv);
  }
  const timeDiv = document.createElement('div');
  timeDiv.className = 'msg-time';
  timeDiv.textContent = formatTime(new Date().toISOString());
  div.appendChild(timeDiv);
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
  div.querySelector('.copy-btn')?.addEventListener('click', () => {
    navigator.clipboard.writeText(content).then(() => toast(t('copied'), 'success'));
  });
}

// --- Chat ---
async function sendMessage() {
  const input = $('#messageInput');
  const text = input.value.trim();
  if (!text || state.loading) return;

  if (!state.currentId) {
    try {
      const s = await api('/api/sessions', { method: 'POST' });
      state.sessions.unshift(s);
      state.currentId = s.id;
      renderSessions();
      updateHeader(s.title);
    } catch (e) {
      toast(t('error') + ': ' + e.message, 'error');
      return;
    }
  }

  input.value = '';
  addMessage('user', text);
  state.loading = true;
  $('#sendBtn').disabled = true;
  showLoading();

  try {
    const res = await api('/api/chat', {
      method: 'POST',
      body: JSON.stringify({
        session_id: state.currentId,
        message: text,
        use_rag: $('#ragToggle').checked,
        thinking_mode: $('#thinkingToggle').checked,
        skills: state.skills,
        persona_id: state.currentPersonaId
      })
    });
    hideLoading();
    if (res.reasoning) addThinking(res.reasoning);
    addMessage('assistant', res.reply);

    const s = state.sessions.find(x => x.id === state.currentId);
    if (s && (s.title === 'New Chat' || s.title === '新对话')) {
      s.title = text.length > 50 ? text.slice(0,50)+'...' : text;
      updateHeader(s.title);
      renderSessions();
    }
    await loadSessions();
  } catch (e) {
    hideLoading();
    addMessage('system', t('error') + ': ' + e.message);
  }
  state.loading = false;
  $('#sendBtn').disabled = false;
  $('#messageInput').focus();
}

// --- Model Select ---
const MODEL_DESCRIPTIONS = {
  'deepseek-chat': 'DeepSeek Chat - 日常对话和任务',
  'deepseek-reasoner': 'DeepSeek Reasoner - 深度推理和分析',
  'deepseek-flash': 'DeepSeek Flash - 快速响应',
  'deepseek-pro': 'DeepSeek Pro - 专业级推理',
  'gpt-4o-mini': 'GPT-4o Mini - 轻量级多模态',
  'gpt-4o': 'GPT-4o - 强大多模态',
  'gpt-3.5-turbo': 'GPT-3.5 Turbo - 经济高效',
};

async function loadProviders() {
  try {
    const [providers, config] = await Promise.all([
      api('/api/models'),
      api('/api/active-model')
    ]);
    state.provider = config.provider;
    state.model = config.model;
    state.providers = providers;
    const sel = $('#modelSelect');
    sel.innerHTML = '';
    
    // 按优先级排序：DeepSeek 在前，然后是自定义模型，最后是其他
    const sortedKeys = Object.keys(providers).sort((a, b) => {
      if (a === 'deepseek') return -1;
      if (b === 'deepseek') return 1;
      if (a === 'openai') return -1;
      if (b === 'openai') return 1;
      if (a.startsWith('custom_')) return 1;
      if (b.startsWith('custom_')) return -1;
      return 0;
    });
    
    for (const key of sortedKeys) {
      const p = providers[key];
      const group = document.createElement('optgroup');
      group.label = p.name;
      
      p.models.forEach(m => {
        const opt = document.createElement('option');
        opt.value = key + ':' + m;
        
        // 显示模型名称和描述
        const desc = MODEL_DESCRIPTIONS[m];
        opt.textContent = desc ? `${m} - ${desc.split(' - ')[1]}` : m;
        
        // 标记当前选中的模型
        if (key === config.provider && m === config.model) {
          opt.selected = true;
        }
        
        // 标记自定义模型
        if (key.startsWith('custom_')) {
          opt.textContent += ' [自定义]';
        }
        
        group.appendChild(opt);
      });
      
      sel.appendChild(group);
    }
    
    // 显示当前模型信息
    updateModelInfo(config.provider, config.model);
  } catch (e) {
    console.error('Failed to load providers:', e);
  }
}

function updateModelInfo(provider, model) {
  const infoEl = $('#modelInfo');
  if (infoEl) {
    const desc = MODEL_DESCRIPTIONS[model];
    infoEl.textContent = desc || `${provider}/${model}`;
    infoEl.classList.add('show');
    setTimeout(() => infoEl.classList.remove('show'), 2000);
  }
}

async function changeModel(value) {
  const [provider, model] = value.split(':');
  try {
    await api('/api/active-model', {
      method: 'POST',
      body: JSON.stringify({ provider, model })
    });
    state.provider = provider;
    state.model = model;
    loadApiStatus(provider);
  } catch (e) {
    toast(t('modelSwitchFail') + ': ' + e.message, 'error');
  }
}

// --- Memory ---
async function loadMemorySessions() {
  try {
    const sessions = await api('/api/sessions');
    const el = $('#memorySessionList');
    if (!sessions.length) {
      el.innerHTML = '<div style="font-size:13px;color:var(--text-secondary);padding:12px 0">暂无对话记录</div>';
      return;
    }
    
    // 获取每个会话的最新消息作为预览
    const sessionsWithPreview = await Promise.all(sessions.map(async (s) => {
      try {
        const messages = await api(`/api/sessions/${s.id}/messages`);
        const lastMsg = messages.length > 0 ? messages[messages.length - 1] : null;
        return {
          ...s,
          messageCount: messages.length,
          preview: lastMsg ? lastMsg.content.substring(0, 100) + (lastMsg.content.length > 100 ? '...' : '') : '暂无消息'
        };
      } catch {
        return {
          ...s,
          messageCount: 0,
          preview: '暂无消息'
        };
      }
    }));
    
    el.innerHTML = sessionsWithPreview.map(s => `
      <div class="memory-session-item" data-id="${s.id}">
        <input type="checkbox" id="memory-${s.id}" value="${s.id}">
        <div class="session-info">
          <div class="session-title">${escapeHtml(s.title)}</div>
          <div class="session-meta">${s.messageCount} 条消息 &middot; ${s.updated_at || s.created_at}</div>
          <div class="session-preview">${escapeHtml(s.preview)}</div>
        </div>
      </div>
    `).join('');
    
    // 点击整个item切换checkbox
    el.querySelectorAll('.memory-session-item').forEach(item => {
      item.addEventListener('click', (e) => {
        if (e.target.type === 'checkbox') return;
        const checkbox = item.querySelector('input[type="checkbox"]');
        checkbox.checked = !checkbox.checked;
      });
    });
  } catch (e) {
    console.error('Failed to load sessions for memory:', e);
    toast('加载对话列表失败: ' + e.message, 'error');
  }
}

async function saveMemory() {
  const checkboxes = document.querySelectorAll('#memorySessionList input[type="checkbox"]:checked');
  if (checkboxes.length === 0) {
    toast('请至少选择一个对话', 'error');
    return;
  }
  
  const sessionIds = Array.from(checkboxes).map(cb => cb.value);
  const statusEl = $('#memoryStatus');
  statusEl.textContent = '正在保存...';
  statusEl.style.color = 'var(--text-secondary)';
  
  try {
    const result = await api('/api/memory/save', {
      method: 'POST',
      body: JSON.stringify({ session_ids: sessionIds })
    });
    
    if (result.chunks === 0) {
      statusEl.textContent = '选中的对话没有消息内容';
      statusEl.style.color = 'var(--warning)';
    } else {
      statusEl.textContent = `保存成功！共 ${result.messages} 条消息，${result.chunks} 个片段已添加到知识库`;
      statusEl.style.color = 'var(--success)';
    }
    
    // 3秒后关闭模态框
    setTimeout(() => {
      $('#memoryModal').classList.remove('open');
      statusEl.textContent = '';
    }, 3000);
  } catch (e) {
    statusEl.textContent = '保存失败: ' + e.message;
    statusEl.style.color = 'var(--danger)';
  }
}

function renderPersonaSelect() {

    state.personas.map(p => `<option value="${p.id}"${p.id === cur ? ' selected' : ''}>${escapeHtml(p.name)}</option>`).join('');

function renderPersonaSkillChips() {
  const grid = $('#personaSkillsGrid');
  if (!state.availableSkills.length) { grid.innerHTML = ''; return; }
  const selected = ($('#personaSkillsInput')?.value || '').split(',').map(s => s.trim()).filter(Boolean);
  grid.innerHTML = state.availableSkills.map(s =>
    `<span class="persona-skill-chip${selected.includes(s.name) ? ' active' : ''}" data-skill="${s.name}">${escapeHtml(s.name)}</span>`
  ).join('');
  grid.querySelectorAll('.persona-skill-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      chip.classList.toggle('active');
      const vals = [];
      grid.querySelectorAll('.persona-skill-chip.active').forEach(c => vals.push(c.dataset.skill));
      if (!$('#personaSkillsInput')) {
        const hidden = document.createElement('input');
        hidden.type = 'hidden';
        hidden.id = 'personaSkillsInput';
        $('#personaForm').appendChild(hidden);
      }
      $('#personaSkillsInput').value = vals.join(',');
    });
  });
}

function resetPersonaForm() {
  editingPersonaId = null;
  $('#personaNameInput').value = '';
  $('#personaPromptInput').value = '';
  const hidden = $('#personaSkillsInput');
  if (hidden) hidden.value = '';
  $('#deletePersonaBtn').style.display = 'none';
  $('#personaStatus').textContent = '';
  $('#personaStatus').style.color = '';
  renderPersonaSkillChips();
  $('#personaModalTitle').textContent = t('personaTitle');
}

function editPersona(pid) {
  const p = state.personas.find(x => x.id === pid);
  if (!p) return;
  editingPersonaId = pid;
  $('#personaNameInput').value = p.name;
  $('#personaPromptInput').value = p.prompt || '';
  const hidden = $('#personaSkillsInput') || (() => { const h = document.createElement('input'); h.type = 'hidden'; h.id = 'personaSkillsInput'; $('#personaForm').appendChild(h); return h; })();
  hidden.value = p.skills || '';
  $('#deletePersonaBtn').style.display = '';
  $('#personaStatus').textContent = '';
  renderPersonaSkillChips();
  $('#personaModalTitle').textContent = t('personaTitle') + ' - ' + p.name;
}

async function savePersona() {
  const name = $('#personaNameInput').value.trim();
  if (!name) { $('#personaStatus').textContent = t('personaNameReq'); $('#personaStatus').style.color = '#ef4444'; return; }
  const prompt = $('#personaPromptInput').value.trim();
  const skillsInput = $('#personaSkillsInput');
  const skills = skillsInput ? skillsInput.value : '';
  try {
    if (editingPersonaId) {
      await api('/api/personas/' + editingPersonaId, { method: 'PUT', body: JSON.stringify({ name, prompt, skills }) });
    } else {
      await api('/api/personas', { method: 'POST', body: JSON.stringify({ name, prompt, skills }) });
    }
    $('#personaStatus').textContent = t('personaSaved');
    $('#personaStatus').style.color = '#22c55e';
    resetPersonaForm();
    await loadPersonas();
  } catch (e) { $('#personaStatus').textContent = e.message; $('#personaStatus').style.color = '#ef4444'; }
}

async function deletePersona() {
  if (!editingPersonaId) return;
  if (!confirm(t('deleteCustomConfirm'))) return;
  await api('/api/personas/' + editingPersonaId, { method: 'DELETE' });
  if (state.currentPersonaId === editingPersonaId) { state.currentPersonaId = ''; renderPersonaSelect(); }
  resetPersonaForm();
  await loadPersonas();
}

async function saveCustomProvider() {
  const name = $('#customNameInput').value.trim();
  const display = $('#customDisplayInput').value.trim();
  const url = $('#customUrlInput').value.trim();
  const models = $('#customModelsInput').value.trim();
  const key = $('#customKeyInput').value.trim();
  if (!name || !url || !models) {
    $('#customStatus').textContent = t('customFillRequired');
    $('#customStatus').style.color = '#ef4444';
    return;
  }
  try {
    const method = editingCustom ? 'PUT' : 'POST';
    const endpoint = editingCustom ? '/api/custom-providers/' + encodeURIComponent(editingCustom) : '/api/custom-providers';
    await api(endpoint, {
      method,
      body: JSON.stringify({ name, display_name: display || name, base_url: url, models })
    });
    if (key) {
      await api('/api/keys/custom_' + encodeURIComponent(name), {
        method: 'POST',
        body: JSON.stringify({ key })
      });
    }
    $('#customKeyInput').value = '';
    $('#customStatus').textContent = t('customSaved');
    $('#customStatus').style.color = '#22c55e';
    editingCustom = null;
    $('#deleteCustomBtn').style.display = 'none';
    $('#customNameInput').disabled = false;
    await loadCustomList();
    await loadProviders();
  } catch (e) {
    $('#customStatus').textContent = e.message;
    $('#customStatus').style.color = '#ef4444';
  }
}

async function deleteCustomProvider() {
  let name = editingCustom || $('#customNameInput').value.trim();
  if (!name || !confirm(t('deleteCustomConfirm'))) return;
  
  // 移除 "custom_" 前缀（如果存在）
  if (name.startsWith('custom_')) {
    name = name.substring(7);
  }
  
  try {
    await api('/api/custom-providers/' + encodeURIComponent(name), { method: 'DELETE' });
    editingCustom = null;
    $('#deleteCustomBtn').style.display = 'none';
    $('#customNameInput').disabled = false;
    $('#customNameInput').value = '';
    $('#customDisplayInput').value = '';
    $('#customUrlInput').value = '';
    $('#customModelsInput').value = '';
    $('#customKeyInput').value = '';
    $('#customStatus').textContent = '';
    await loadCustomList();
    await loadProviders();
  } catch (e) {
    $('#customStatus').textContent = e.message;
    $('#customStatus').style.color = '#ef4444';
  }
}

// --- Language ---
function toggleLang() {
  state.lang = state.lang === 'zh' ? 'en' : 'zh';
  applyLang();
}

function applyLang() {
  const lang = LANG[state.lang] || LANG.zh;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (key in lang) el.textContent = lang[key];
  });
  document.querySelectorAll('[data-i18n-label]').forEach(el => {
    const key = el.dataset.i18nLabel;
    if (key in lang) el.textContent = lang[key];
  });
  $('#langBtn').textContent = t('lang' + (state.lang === 'zh' ? 'En' : 'Zh'));
  if (!$('#sessionTitle').dataset.manual) {
    $('#sessionTitle').textContent = t('sessionTitle');
  }
  $('#messageInput').placeholder = t('inputPlaceholder');
  if (editingCustom) {
    $('#customModalTitle').textContent = t('customTitle') + ' - ' + editingCustom;
  }
  renderSessions();
  loadApiStatus(state.provider);
}

// --- Init ---
async function init() {
  applyTheme();
  await loadProviders();
  await loadSessions();
  await loadApiStatus(state.provider);
  await loadPersonas();
  if (state.sessions.length > 0) {
    await switchSession(state.sessions[0].id);
  }

  const closeModals = () => {
    $$('.modal-overlay.open').forEach(m => m.classList.remove('open'));
  };
  $$('.modal-overlay').forEach(m => {
    m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModals();
  });
  $$('.modal input').forEach(inp => {
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const modal = inp.closest('.modal-overlay');
        if (modal) {
          const primary = modal.querySelector('.btn-primary');
          if (primary) primary.click();
        }
      }
    });
  });

  $('#newChatBtn').addEventListener('click', createSession);
  $('#sendBtn').addEventListener('click', sendMessage);
  $('#messageInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  $('#modelSelect').addEventListener('change', e => changeModel(e.target.value));
  $('#langBtn').addEventListener('click', toggleLang);
  $('#themeToggle').addEventListener('click', toggleTheme);
  $('#personaSelect').addEventListener('change', e => { state.currentPersonaId = e.target.value; });
  $('#openPersonaBtn').addEventListener('click', async () => {
    await loadPersonas();
    if (!state.availableSkills.length) { try { state.availableSkills = await api('/api/skills'); } catch {} }
    resetPersonaForm();
    $('#personaModal').classList.add('open');
  });
  $('#closePersonaFormBtn').addEventListener('click', () => $('#personaModal').classList.remove('open'));
  $('#savePersonaBtn').addEventListener('click', savePersona);
  $('#deletePersonaBtn').addEventListener('click', deletePersona);
  $('#openApiBtn').addEventListener('click', () => {
    $('#apiModal').classList.add('open');
    loadApiStatus(state.provider);
  });
  $('#closeApiBtn').addEventListener('click', closeModals);
  $('#saveApiKeyBtn').addEventListener('click', saveApiKey);
  $('#deleteApiKeyBtn').addEventListener('click', deleteApiKey);
  $('#clearAllKeysBtn').addEventListener('click', clearAllKeys);
  $('#openSkillsBtn').addEventListener('click', () => { $('#skillsModal').classList.add('open'); loadSkills(); });
  $('#closeSkillsBtn').addEventListener('click', closeModals);
  $('#openRagBtn').addEventListener('click', () => { $('#ragModal').classList.add('open'); loadDocuments(); });
  $('#closeRagBtn').addEventListener('click', closeModals);
  $('#uploadRagBtn').addEventListener('click', uploadDocument);
  $('#openMemoryBtn').addEventListener('click', () => { $('#memoryModal').classList.add('open'); loadMemorySessions(); });
  $('#closeMemoryBtn').addEventListener('click', closeModals);
  $('#saveMemoryBtn').addEventListener('click', saveMemory);
  $('#openCustomBtn').addEventListener('click', () => {
    editingCustom = null;
    $('#customModalTitle').textContent = t('customTitle');
    $('#customNameInput').value = '';
    $('#customNameInput').disabled = false;
    $('#customDisplayInput').value = '';
    $('#customUrlInput').value = '';
    $('#customModelsInput').value = '';
    $('#customKeyInput').value = '';
    $('#deleteCustomBtn').style.display = 'none';
    $('#customStatus').textContent = '';
    $('#customModal').classList.add('open');
    loadCustomList();
  });
  $('#closeCustomBtn').addEventListener('click', closeModals);
  $('#saveCustomBtn').addEventListener('click', saveCustomProvider);
  $('#deleteCustomBtn').addEventListener('click', deleteCustomProvider);

  const backdrop = $('#sidebar-backdrop');
  if (backdrop) {
    backdrop.addEventListener('click', () => {
      $('#sidebar').classList.remove('open');
      backdrop.classList.remove('open');
    });
  }

  applyLang();
}
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
